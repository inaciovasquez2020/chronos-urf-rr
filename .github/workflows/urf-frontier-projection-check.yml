name: urf-frontier-projection-check

on:
  push:
    paths:
      - 'docs/status/URF_FRONTIER_POINTER_REGISTRY_V1.json'
      - 'docs/status/WHOLE_URF_FRONTIER_POINTER.md'
      - 'scripts/check_urf_frontier_projection.py'
      - 'tests/test_urf_frontier_projection_check.py'
      - '.github/workflows/urf-frontier-projection-check.yml'
  pull_request:
    paths:
      - 'docs/status/URF_FRONTIER_POINTER_REGISTRY_V1.json'
      - 'docs/status/WHOLE_URF_FRONTIER_POINTER.md'
      - 'scripts/check_urf_frontier_projection.py'
      - 'tests/test_urf_frontier_projection_check.py'
      - '.github/workflows/urf-frontier-projection-check.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pytest -q tests/test_urf_frontier_projection_check.py
