name: urf-frontier-pointer-registry-schema-lock

on:
  push:
    paths:
      - 'docs/status/URF_FRONTIER_POINTER_REGISTRY_V1.json'
      - 'scripts/check_urf_frontier_pointer_registry_schema_lock.py'
      - 'tests/test_urf_frontier_pointer_registry_schema_lock.py'
      - '.github/workflows/urf-frontier-pointer-registry-schema-lock.yml'
  pull_request:
    paths:
      - 'docs/status/URF_FRONTIER_POINTER_REGISTRY_V1.json'
      - 'scripts/check_urf_frontier_pointer_registry_schema_lock.py'
      - 'tests/test_urf_frontier_pointer_registry_schema_lock.py'
      - '.github/workflows/urf-frontier-pointer-registry-schema-lock.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install pytest

      - run: python -m pytest -q tests/test_urf_frontier_pointer_registry_schema_lock.py
