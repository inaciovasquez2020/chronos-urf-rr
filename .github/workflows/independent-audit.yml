name: independent-audit

on:
  workflow_dispatch:
  push:
    tags:
      - 'audit-ready-*'

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install elan
        shell: bash
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          elan show
          lean --version
          lake --version

      - name: Update dependencies
        shell: bash
        run: |
          set -euo pipefail
          lake update

      - name: Fetch mathlib cache
        shell: bash
        run: |
          set -euo pipefail
          lake exe cache get || true

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          lake build
