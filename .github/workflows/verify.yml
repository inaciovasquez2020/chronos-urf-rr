name: verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: RR invariant checks
        run: |
          test -f docs/RR_INVARIANTS.md
          test -f CONTRIBUTING.md
          test -f docs/REFEREE_OVERVIEW.md
