name: external-status-lock

on:
  push:
  pull_request:

jobs:
  external-status-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load CI manifest
        id: manifest
        run: |
          echo "MANIFEST=$(cat .ci/verifier-manifest.json)" >> $GITHUB_ENV

      - name: Verify operator norm perturbation boundary
        run: python3 tools/verify_operator_norm_perturbation_boundary.py

      - name: Verify known gravity limit boundary
        run: python3 tools/verifier/verify_gravity_boundary.py

      - name: Verify forbidden overclaims
        run: python3 scripts/check_forbidden_overclaims.py --schema schemas/overclaims.json --paths lean Chronos

      - name: Verify ledger reconciliation
        run: python3 scripts/reconcile_ledger.py --input artifacts/ledger/input.json --schema schemas/ledger.json --output artifacts/ledger/output.json

      - name: Verify external status lock
        run: python3 scripts/verify_external_status_lock.py

      - name: Verify Chronos semantic derivation rules boundary
        run: python3 tools/verifier/verify_chronos_semantic_derivation_rules_boundary.py
