name: CI

on:
  push:
  pull_request:

jobs:
  unified-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest networkx numpy pyyaml

      - name: Run Lean build
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          lake build

      - name: Run core verifiers
        run: |
          python3 tools/verifier/verify_operator_norm_perturbation_boundary.py
          python3 tools/verifier/verify_chronos_root_spectral_solve_boundary.py
          python3 tools/verifier/verify_chronos_semantic_derivation_rules_boundary.py
          python3 scripts/verify_external_status_lock.py

      - name: Run CI layer tests (optional)
        run: |
          if [ -d tests ]; then pytest -q; fi
