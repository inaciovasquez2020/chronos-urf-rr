name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean (fully deterministic)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          export PATH="$HOME/.elan/bin:$PATH"

          ~/.elan/bin/elan toolchain install leanprover/lean4:stable
          ~/.elan/bin/elan default leanprover/lean4:stable

      - name: Lean build (no PATH dependency)
        run: |
          ~/.elan/bin/lake build

      - name: Python checks (guarded)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest networkx numpy pyyaml

          if [ -d tests ] && ls tests/*.py 1> /dev/null 2>&1; then
            PYTHONPATH="$PWD/src:$PWD" pytest -q
          else
            echo "No tests found - skipping pytest"
          fi
